    function initMap() {
        const container = document.getElementById('map');
        const options = { center: new kakao.maps.LatLng(36.1, 127.7), level: 13 };
        map = new kakao.maps.Map(container, options);
        geocoder = new kakao.maps.services.Geocoder(); 
        places = new kakao.maps.services.Places(); 

        clusterer = new kakao.maps.MarkerClusterer({
            map: map, averageCenter: true, minLevel: 7 
        });

        kakao.maps.event.addListener(clusterer, 'clusterclick', function(cluster) {
            var level = map.getLevel() - 2;
            map.setLevel(level, {anchor: cluster.getCenter()});
        });

        kakao.maps.event.addListener(map, 'click', function(mouseEvent) { 
            closeBottomSheet(); closeDropdown(); cancelSearch(); 

            var latlng = mouseEvent.latLng;
            showLoadingMsg("📍 선택한 위치의 건물을 파악 중입니다...");

            geocoder.coord2Address(latlng.getLng(), latlng.getLat(), function(result, status) {

                    var roadAddr = result[0].road_address;
                    var jibunAddr = result[0].address;
                    
                    var searchTarget = "";
                    if (roadAddr && roadAddr.road_name && roadAddr.main_building_no) {
                        searchTarget = roadAddr.road_name + " " + roadAddr.main_building_no;

                        searchTarget = jibunAddr.region_3depth_name + " " + jibunAddr.main_address_no;

    function extractBorough(fullAddress) {
        if (!fullAddress) return "";
        if (fullAddress.includes("세종")) return "";
        let words = fullAddress.trim().split(/\s+/);
        for (let w of words) {
            if (w.endsWith("구") || w.endsWith("군") || (w.endsWith("시") && !w.includes("특별") && !w.includes("광역"))) {
                return w;
            }
        }
        return "";
    }

    function extractAddressParams(fullAddress) {
        if (!fullAddress) return { searchKeyword: "", address2: "" };
        let clean = fullAddress.replace(/^(서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)(특별자치시|특별시|광역시|도|특별자치도)?\s*/, '');
        clean = clean.replace(/([가-힣A-Za-z]+[길로동읍면])(\d+)/g, '$1 $2'); 

        let words = clean.trim().split(/\s+/);
        let numIdx = -1;

        for (let i = words.length - 1; i >= 0; i--) {
            if (/^\d/.test(words[i])) { numIdx = i; break; }
        }

        let searchKeyword = "";
        let address2 = "";

        if (numIdx !== -1) {
            address2 = words[numIdx];
            searchKeyword = words[numIdx - 1] || "";
        } else {
            searchKeyword = words[words.length - 1] || "";
        }

        return { searchKeyword: searchKeyword.trim(), address2: address2.trim() };
    }

    function parseAddressNumber(str) {
        if (!str) return null;
        let match = str.match(/([0-9]+)(?:-([0-9]+))?/);
        return match ? { main: parseInt(match[1], 10), sub: match[2] ? parseInt(match[2], 10) : 0 } : null;
    }

    function filterValidElevators(items, borough, roadKeyword, roadNo, dongKeyword, jibunNo) {
        if (!items || items.length === 0) return [];
        
        const bClean = borough ? borough.replace(/\s+/g, '').toLowerCase() : "";
        const rClean = roadKeyword ? roadKeyword.replace(/\s+/g, '').toLowerCase() : "";
        const dClean = dongKeyword ? dongKeyword.replace(/\s+/g, '').toLowerCase() : "";
        const rNum = parseAddressNumber(roadNo);
        const jNum = parseAddressNumber(jibunNo);

        return items.filter(item => {
            let addr1 = String(item.address1 || item.address || "");
            let addr2 = String(item.address2 || "");
            let fullStr = (addr1 + " " + addr2).replace(/\s+/g, '').toLowerCase();

            if (bClean && !fullStr.includes(bClean)) return false;

            const matchNumber = (targetNum) => {
                if (!targetNum) return false;
                let numRegex = new RegExp(`(?:^|[^0-9])${targetNum.main}(?:[^0-9]|$)`);
                if (!numRegex.test(addr1 + " " + addr2)) return false;
                
                if (targetNum.sub > 0) {
                    return fullStr.includes(`${targetNum.main}-${targetNum.sub}`) || fullStr.includes(`${targetNum.main}번지${targetNum.sub}`);
                }
                return true;
            };

            if (rClean && fullStr.includes(rClean) && matchNumber(rNum)) return true;
            if (dClean && fullStr.includes(dClean) && matchNumber(jNum)) return true;

            return false;
        });
    }

    // 🚀 [수파베이스 쿼리 간소화] 행정구역 명칭 차이로 인한 누락을 막기 위해 핵심 키워드만으로 와일드카드 조회
async function fetchElevatorDataByAddressOrBuilding(apiSido, roadAddr, jibunAddr, placeName, signal) {
    showLoadingMsg(`⏳ Supabase 자산 DB에서 매핑 정보 조회 중...`);
    
    try {
        const rParams = extractAddressParams(roadAddr);
        const jParams = extractAddressParams(jibunAddr);
        const borough = extractBorough(roadAddr) || extractBorough(jibunAddr);
        
        let dbItems = [];
        let error = null;

        // 1차: 시도/시군구를 쿼리에서 빼고 '능동로', '90' 핵심 키워드로만 1차 와일드카드 추출
        if (rParams.searchKeyword && rParams.address2) {
            const { data, err } = await supabaseClient
                .from('elevators_raws')
                .select('*')
                .ilike('address1', `%${rParams.searchKeyword}%`)
                .ilike('address1', `%${rParams.address2}%`);
                
            if (data && data.length > 0) dbItems = data;
            error = err;
        }
        
        // 2차: 지번 탐색 백업
        if (dbItems.length === 0 && jParams.searchKeyword && jParams.address2) {
            const { data, err } = await supabaseClient
                .from('elevators_raws')
                .select('*')
                .ilike('address1', `%${jParams.searchKeyword}%`)
                .ilike('address1', `%${jParams.address2}%`);
                
            if (data && data.length > 0) dbItems = data;
            if (!error) error = err;
        }

        if (!error && dbItems && dbItems.length > 0) {
            console.log("Supabase 1차 추출 성공 (데이터 확인용):", dbItems);
            
            // 추출된 데이터를 기존에 만드신 정교한 자산(filterValidElevators)을 통해 2차 정밀 필터링
            let validDbItems = filterValidElevators(dbItems, borough, rParams.searchKeyword, rParams.address2, jParams.searchKeyword, jParams.address2);
            if (validDbItems.length > 0) return validDbItems;
        } else if (error) {
            console.error("Supabase 쿼리 에러:", error);
        }
    } catch (supabaseError) {
        console.error("Supabase 연결 실패.", supabaseError);
    }

    // --- 이하 기존 공공데이터 Fallback 인프라 레일 유지 (건드리지 않음) ---
    const rParamsFallback = extractAddressParams(roadAddr);
    const jParamsFallback = extractAddressParams(jibunAddr);
    const boroughFallback = extractBorough(roadAddr) || extractBorough(jibunAddr);
    
    let combinedItems = [];
    let fetchPromises = [];

    if (rParamsFallback.searchKeyword) {
        fetchPromises.push(requestPublicElevatorList(apiSido, rParamsFallback.searchKeyword, signal));
    }
    if (jParamsFallback.searchKeyword && jParamsFallback.searchKeyword !== rParamsFallback.searchKeyword) {
        fetchPromises.push(requestPublicElevatorList(apiSido, jParamsFallback.searchKeyword, signal));
    }

    try {
        const results = await Promise.all(fetchPromises);
        results.forEach(res => { if (Array.isArray(res)) combinedItems.push(...res); });
    } catch(e) { console.error("Parallel scan error", e); }

    let validItems = filterValidElevators(combinedItems, boroughFallback, rParamsFallback.searchKeyword, rParamsFallback.address2, jParamsFallback.searchKeyword, jParamsFallback.address2);

    if (validItems.length === 0 && placeName) {
        try {
            let cleanBuldNm = placeName.split(/\s+/)[0]; 
            const backupUrl = API_CONFIG.BASE_URL + `?serviceKey=${API_CONFIG.SERVICE_KEY}&numOfRows=500&sido=${encodeURIComponent(apiSido)}&buld_nm=${encodeURIComponent(cleanBuldNm)}&_type=json`;
            let resBackup = await fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(backupUrl), { signal });
            if (resBackup.ok) {
                let dataBackup = await resBackup.json();
                let backupItems = dataBackup.response?.body?.items?.item || [];
                if (!Array.isArray(backupItems)) backupItems = [backupItems];
                
                validItems = filterValidElevators(backupItems, boroughFallback, rParamsFallback.searchKeyword, rParamsFallback.address2, jParamsFallback.searchKeyword, jParamsFallback.address2);
            }
        } catch (e) { console.error("Backup trigger bypass."); }
    }
    return validItems;
}

    async function requestPublicElevatorList(apiSido, address1, signal) {
        const baseUrl = API_CONFIG.BASE_URL + `?serviceKey=${API_CONFIG.SERVICE_KEY}&numOfRows=500&sido=${encodeURIComponent(apiSido)}&address1=${encodeURIComponent(address1)}&_type=json`;
        let list = [];
        try {
            let res = await fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(baseUrl + `&pageNo=1`), { signal });
            if (res.ok) {
                let data = await res.json();
                let totalCount = data.response?.body?.totalCount || 0;
                let items = data.response?.body?.items?.item || [];
                if (!Array.isArray(items)) items = [items];
                list.push(...items);

                let maxPages = Math.min(Math.ceil(totalCount / 500), 10); 
                if (maxPages > 1) {
                    let fetchPromises = [];
                    for (let p = 2; p <= maxPages; p++) {
                        fetchPromises.push(
                            fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(baseUrl + `&pageNo=${p}`), { signal }).then(r => r.ok ? r.json() : null).catch(() => null)
                        );
                    }
                    let results = await Promise.all(fetchPromises);
                    results.forEach(resData => {
                        if (resData && resData.response?.body?.items?.item) {
                            let itms = resData.response.body.items.item;
                            if (!Array.isArray(itms)) itms = [itms];
                            list.push(...itms);
                        }
                    });
                }
            }
        } catch (e) { console.error("Fetch failure", e); }
        return list;
    }

    function searchKakaoPlaces() {
        const query = document.getElementById('searchInput').value.trim();
        const sido = document.getElementById('sidoSelector').value; 
        closeDropdown(); closeBottomSheet();
        if (query === '') { alert("상호명이나 장소를 입력해주세요."); return; }
        saveRecentSearch(sido, query);
        showLoadingMsg(`⏳ [${query}] 관내 모든 지점을 찾는 중입니다...`);

        let allPlaces = []; 
        const placesSearchCB = function(result, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                allPlaces.push(...result);
                if (pagination.hasNextPage) { pagination.nextPage(); } 
                else { hideLoadingMsg(); renderPlaceList(allPlaces, query); }
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                if (allPlaces.length > 0) { hideLoadingMsg(); renderPlaceList(allPlaces, query); } 
                else { hideLoadingMsg(); alert(`[${sido}] 지역에 "${query}" 장소가 검색되지 않습니다.`); }
            } else { hideLoadingMsg(); alert("카카오 장소 검색 중 통신 오류가 발생했습니다."); }
        };
        places.keywordSearch(`${sido} ${query}`, placesSearchCB, { size: 15 });
    }

        dropdown.innerHTML = `<div class="dropdown-header">정확한 장소를 선택하거나 전체를 표시하세요👇</div>`;

        if (DISTRICT_MAP[sido]) {

            dropdown.appendChild(megaScanDiv);

            }
        });
        addressList = [...new Set(addressList)];
        const addressStr = JSON.stringify(addressList).replace(/"/g, '&quot;');

        const searchAllDiv = document.createElement('div');
        searchAllDiv.className = 'dropdown-item';
        searchAllDiv.innerHTML = `<div class="item-text" onmousedown="executeMultiAddressSearch(event, ${addressStr}, '${keyword}')" ontouchstart="executeMultiAddressSearch(event, ${addressStr}, '${keyword}')" style="color:#1e4e79; font-weight:bold; text-align:center;">🚀 검색된 '${keyword}' 전체 다 표시하기</div>`;
        dropdown.appendChild(searchAllDiv);

        placesResult.forEach(place => {
            const div = document.createElement('div'); div.className = 'dropdown-item';
            div.innerHTML = `
                <div class="item-text" onmousedown="fetchExactElevator(event, '${place.place_name}', '${place.road_address_name || ""}', '${place.address_name || ""}')" ontouchstart="fetchExactElevator(event, '${place.place_name}', '${place.road_address_name || ""}', '${place.address_name || ""}')">
                    <span style="font-weight:bold; color:#1e4e79;">🏢 ${place.place_name.replace(keyword, `<span style="color:#d32f2f;">${keyword}</span>`)}</span>
                    <span style="font-size:11px; color:#666;">📍 ${place.road_address_name || place.address_name}</span>
                </div>
            `;
            dropdown.appendChild(div);
        });
        dropdown.style.display = 'block';

    async function executeMegaScan(event, sido, keyword) {
        if (event && (event.type === 'touchend' || event.type === 'touchstart') && isTouchMoved) return;
        if (event) { event.preventDefault(); event.stopPropagation(); }
        closeDropdown(); closeBottomSheet(); cancelSearch();
        
        currentAbortController = new AbortController();
        const signal = currentAbortController.signal;
        showLoadingMsg(`⏳ [${sido} ${keyword}] 지점을 샅샅이 수집 중입니다...`);
        
        lastQuery = keyword; lastSido = sido; globalGroups = []; allElevatorsData = []; clusterer.clear();

        const districts = DISTRICT_MAP[sido] || [sido];
        let allPlaces = [];

        const fetchPromises = districts.map(district => {
            return new Promise(resolve => {
                places.keywordSearch(`${sido} ${district} ${keyword}`, (result, status) => {
                    resolve(status === kakao.maps.services.Status.OK ? result : []);
                }, { size: 15 });
            });
        });

        const results = await Promise.all(fetchPromises);
        results.forEach(res => allPlaces.push(...res));

        const uniquePlaces = new Map();
        allPlaces.forEach(p => {
            const addr = p.road_address_name || p.address_name;
            if (addr && !uniquePlaces.has(addr)) uniquePlaces.set(addr, p);
        });

        let placeArray = Array.from(uniquePlaces.values());
        hideLoadingMsg();
        if (placeArray.length === 0) { alert(`[${sido}] 지역에 검색된 데이터가 없습니다.`); return; }

        globalGroups = placeArray.map(p => {
            return {
                buildingName: p.place_name, address: p.road_address_name || p.address_name,
                roadAddress: p.road_address_name || "", jibunAddress: p.address_name || "",
                lat: parseFloat(p.y), lng: parseFloat(p.x), isDummy: true, noElevator: false, elevators: [] 
            };
        });

        renderData(); 
        startBackgroundSync(); 
    }

    // 데이터 스캔 완료 및 백그라운드 파싱 완료 시 상호명 뒤에 [건물명]을 동적으로 바인딩하는 로직
    async function hydrateDummyGroup(group, signal) {
        const sido = document.getElementById('sidoSelector').value; 
        const apiSido = FULL_SIDO_MAP[sido] || sido;
        
        let validItems = await fetchElevatorDataByAddressOrBuilding(apiSido, group.roadAddress || group.address, group.jibunAddress || group.address, group.buildingName, signal);

        // 로드된 레코드셋의 실건물명을 상호라벨 뒤에 [건물명] 구조로 결합
        if (validItems && validItems.length > 0) {
            let firstItem = validItems[0];
            let origBuldNm = String(firstItem.buldNm || firstItem.buld_nm || "").trim();
            if (origBuldNm && origBuldNm !== "null" && !origBuldNm.includes("없음") && !group.buildingName.includes(origBuldNm)) {
                group.buildingName = `${group.buildingName} [${origBuldNm}]`;
            }
        }

        const uniqueMap = new Map();
        validItems.forEach(item => {
            const elvNo = item.elevatorNo || item.elevator_no;
            if (elvNo && !uniqueMap.has(elvNo)) uniqueMap.set(elvNo, item);
        });

        let elevs = Array.from(uniqueMap.values()).filter(apiItem => {
            const type = String(apiItem.elvtrKindNm || apiItem.elvtrDivNm || "");
            return !(type.includes('덤웨이터') || type === '화물용' || (type.includes('화물용') && !type.includes('승객')));
        });

        group.elevators = elevs.map(apiItem => {
            const stts = String(apiItem.elvtrSttsNm || apiItem.elvtr_stts_nm || apiItem.elvtrStts || "상태불명").trim();
            const isOperating = !(stts.includes('정지') || stts.includes('중지') || stts.includes('불합격') || stts.includes('고장') || stts.includes('폐기') || stts.includes('휴지') || stts.includes('검사연기') || stts.includes('폐지') || stts.includes('확인불가'));
            const rawType = String(apiItem.elvtrKindNm || apiItem.elvtrDivNm || ""); let refinedType = "승객용"; 
            if (rawType.includes("장애") && rawType.includes("휠체어") && rawType.includes("화물") && rawType.includes("승객")) refinedType = "장애/승객화물용";
            else if (rawType.includes("에스컬레이터")) refinedType = "에스컬레이터";
            else if (rawType.includes("무빙워크")) refinedType = "무빙워크";
            else if (rawType.includes("수직") && rawType.includes("휠체어")) refinedType = "수직형휠체어리프트";
            else if (rawType.includes("경사") && rawType.includes("휠체어")) refinedType = "경사형휠체어리프트";
            else if (rawType.includes("장애인")) refinedType = "장애인용";
            else if (rawType.includes("소방") || rawType.includes("구조") || rawType.includes("비상")) refinedType = "소방구조용";

    async function executeBroadSearch() {

        const searchType = document.getElementById('searchType').value; 
        closeDropdown(); closeBottomSheet(); cancelSearch();

        showLoadingMsg("⏳ 서버 통신 준비 중...");

        const apiSido = FULL_SIDO_MAP[lastSido] || lastSido;
        let baseApiUrl = API_CONFIG.BASE_URL + `?serviceKey=${API_CONFIG.SERVICE_KEY}&numOfRows=500&sido=` + encodeURIComponent(apiSido);
        
        if (searchType === 'building') {
            baseApiUrl += `&buld_nm=` + encodeURIComponent(query) + `&_type=json`;
        } else {
            const params = extractAddressParams(query);
            baseApiUrl += `&address1=` + encodeURIComponent(params.searchKeyword);
            baseApiUrl += `&_type=json`;
        }

        try {
            showLoadingMsg(`⏳ 서버와 연결 중...`);
            let resFirst = await fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(baseApiUrl + `&pageNo=1`), { signal });
            if (!resFirst.ok) throw new Error("서버 응답 오류");
            
            let firstData = await resFirst.json(); let combinedItems = []; let totalCount = firstData.response?.body?.totalCount || 0;
            let items = firstData.response?.body?.items?.item || [];
            if (!Array.isArray(items)) items = [items]; combinedItems.push(...items);

            let maxPages = Math.min(Math.ceil(totalCount / 500), 30); 
            if (maxPages > 1) {
                showLoadingMsg(`⏳ 전체 데이터(${totalCount}건) 확인 중...`);
                let fetchPromises = []; for (let p = 2; p <= maxPages; p++) { fetchPromises.push(p); }
                for (let i = 0; i < fetchPromises.length; i += 3) {
                    let batch = fetchPromises.slice(i, i + 3);
                    let batchRequests = batch.map(p => 
                        fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(baseApiUrl + `&pageNo=${p}`), { signal })
                        .then(r => { if(r.status === 429) throw new Error("429"); return r.ok ? r.json() : null; }).catch(e => null)
                    );
                    let results = await Promise.all(batchRequests);
                    results.forEach(resData => {
                        if (resData && resData.response?.body?.items?.item) {
                            let itms = resData.response?.body?.items?.item;
                            if (!Array.isArray(itms)) itms = [itms]; combinedItems.push(...itms);
                        }
                    });

                }

            const queryNoSpace = query.replace(/\s+/g, '').toLowerCase(); 
            let validItems = combinedItems.filter(item => {

                } else {
                    const params = extractAddressParams(query);
                    const borough = extractBorough(query);
                    return filterValidElevators([item], borough, params.searchKeyword, params.address2, params.searchKeyword, params.address2).length > 0;
                }
            });

            const uniqueMap = new Map();
            validItems.forEach(item => { const elvNo = item.elevatorNo || item.elevator_no; if (elvNo && !uniqueMap.has(elvNo)) uniqueMap.set(elvNo, item); });

            allElevatorsData = Array.from(uniqueMap.values()).filter(apiItem => {
                const type = String(apiItem.elvtrKindNm || apiItem.elvtrDivNm || "");
                return !(type.includes('덤웨이터') || type === '화물용' || (type.includes('화물용') && !type.includes('승객')));
            });

            hideLoadingMsg(); currentAbortController = null;
            if (allElevatorsData.length === 0) { alert(`검색 결과가 존재하지 않습니다.`); return; }
            buildGlobalGroups();
        } catch (error) {
            currentAbortController = null; if (error.name !== 'AbortError') { hideLoadingMsg(); alert("통신 에러"); }
        }

    function buildGlobalGroups() {
        const groupedMap = new Map();

        allElevatorsData.forEach(apiItem => {
            const buldNm = apiItem.customBuldNm || apiItem.buldNm || apiItem.buld_nm || "건물명 없음";
            const addr1 = String(apiItem.address1 || apiItem.address || ""); const addr2 = String(apiItem.address2 || "");
            const address = (addr1 + " " + addr2).trim() || "주소 없음"; const key = `${buldNm}_${address}`;

            if (!groupedMap.has(key)) {
                groupedMap.set(key, {
                    buildingName: buldNm, address: address,
                    roadAddress: addr1 + " " + addr2, jibunAddress: addr1 + " " + addr2,
                    lat: parseFloat(apiItem.gpsLati || apiItem.gps_lati) || null,
                    lng: parseFloat(apiItem.gpsLong || apiItem.gps_long) || null,
                    isDummy: false, noElevator: false, elevators: []
                });
            }

            const stts = String(apiItem.elvtrSttsNm || apiItem.elvtr_stts_nm || apiItem.elvtrStts || "상태불명").trim();
            const isOperating = !(stts.includes('정지') || stts.includes('중지') || stts.includes('불합격') || stts.includes('고장') || stts.includes('폐기') || stts.includes('휴지') || stts.includes('검사연기') || stts.includes('폐지') || stts.includes('확인불가'));
            
            const rawType = String(apiItem.elvtrKindNm || apiItem.elvtrDivNm || ""); let refinedType = "승객용"; 
            if (rawType.includes("장애") && rawType.includes("휠체어") && rawType.includes("화물") && rawType.includes("승객")) refinedType = "장애/승객화물용";
            else if (rawType.includes("에스컬레이터")) refinedType = "에스컬레이터";
            else if (rawType.includes("무빙워크")) refinedType = "무빙워크";
            else if (rawType.includes("수직") && rawType.includes("휠체어")) refinedType = "수직형휠체어리프트";
            else if (rawType.includes("경사") && rawType.includes("휠체어")) refinedType = "경사형휠체어리프트";
            else if (rawType.includes("장애인")) refinedType = "장애인용";
            else if (rawType.includes("소방") || rawType.includes("구조") || rawType.includes("비상")) refinedType = "소방구조용";
            else if (rawType.includes("화물") && rawType.includes("승객")) refinedType = "승객화물용";
            else if (rawType.includes("병원") || rawType.includes("침대")) refinedType = "병원용";

            let weightNum = String(apiItem.liveLoad || apiItem.live_load || "").replace(/[^0-9]/g, ""); 
            let finalWeight = weightNum ? weightNum + " kg" : "-";
            let speedNum = String(apiItem.ratedSpeed || apiItem.rated_speed || "").replace(/[^0-9.]/g, "");
            let finalSpeed = speedNum ? speedNum + " m/min" : "-";
            let capNum = String(apiItem.prsonCnt || apiItem.personCnt || apiItem.person_cnt || "").replace(/[^0-9]/g, "");
            let finalCapacity = "-";
            if (capNum && parseInt(capNum) > 0) finalCapacity = parseInt(capNum) + "명";
            else if (weightNum && parseInt(weightNum) > 0) finalCapacity = Math.floor(parseInt(weightNum) / 75) + "명";
            if (refinedType === "에스컬레이터" || refinedType === "무빙워크") finalCapacity = "-";

            groupedMap.get(key).elevators.push({
                elevatorNo: apiItem.elevatorNo || apiItem.elevator_no || "번호 미상",
                type: refinedType, speed: finalSpeed, floors: apiItem.shuttleSection || apiItem.shuttle_section || "-",
                weight: finalWeight, capacity: finalCapacity, installPlace: String(apiItem.installationPlace || apiItem.installation_place || "-").trim(),
                state: stts, isOperating: isOperating, scanned: false 
            });
        });

        globalGroups = Array.from(groupedMap.values());
        Promise.all(globalGroups.map(group => {
            return new Promise((resolve) => {
                if (group.lat && group.lng) { resolve(); return; }
                if (geocodeCache.has(group.address)) {
                    const coords = geocodeCache.get(group.address); group.lat = coords.lat; group.lng = coords.lng; resolve(); return;
                }
                geocoder.addressSearch(group.address, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) { group.lat = parseFloat(result[0].y); group.lng = parseFloat(result[0].x); } 
                    else { group.lat = 36.4792 + (Math.random() - 0.5) * 0.05; group.lng = 127.2892 + (Math.random() - 0.5) * 0.05; }
                    geocodeCache.set(group.address, {lat: group.lat, lng: group.lng}); resolve();
                });
            });
        })).then(() => { renderData(); startBackgroundSync(); });
    }

    function renderData(isBackgroundUpdate = false) {
        let renderList = [...globalGroups];
        const queryLower = lastQuery.replace(/\s+/g, '').toLowerCase();
        const getScore = (g) => {
            const name = g.buildingName.replace(/\s+/g, '').toLowerCase(); const addr = g.address.replace(/\s+/g, '').toLowerCase();
            let score = 0;
            if (name === queryLower || addr === queryLower) score += 1000;
            else if (name.startsWith(queryLower) || addr.startsWith(queryLower)) score += 500;
            else if (name.includes(queryLower) || addr.includes(queryLower)) score += 100;
            return score - name.length;
        };
        renderList.sort((a, b) => getScore(b) - getScore(a));
        
        clusterer.clear(); let newOverlays = []; let usedCoords = new Set(); 

        renderList.forEach(group => {
            if(group.lat === 0 || group.lng === 0 || group.lat === null) return; 
            
            const stoppedCount = group.isDummy ? 0 : group.elevators.filter(e => !e.isOperating).length;
            const isAllStopped = !group.isDummy && !group.noElevator && group.elevators.length > 0 && stoppedCount === group.elevators.length;
            
            const content = document.createElement('div');
            
            if (group.noElevator) {
                content.className = 'custom-marker no-elv';
                content.innerHTML = `<span>${group.buildingName} (승강기없음)</span>`;
            } else if (group.isDummy) {
                content.className = 'custom-marker dummy';
                content.innerHTML = `<span>${group.buildingName}</span><span style="background:#eee; color:#777; padding:1px 4px; border-radius:4px; margin-left:4px; font-size:10.5px;">스캔대기</span>`;
            } else {
                content.className = isAllStopped ? 'custom-marker stopped' : 'custom-marker';
                let badge = '';
                if (stoppedCount > 0) {
                    badge = `<span style="background: white; color: #d32f2f; padding: 1px 4px; border-radius: 4px; margin-left: 4px; font-size: 10.5px; font-weight: 900; box-shadow: 0 1px 2px rgba(0,0,0,0.2);">정지/연기 ${stoppedCount}대</span>`;
                }
                content.innerHTML = `<span>${group.buildingName} (${group.elevators.length}대)</span>` + badge;
            }

            content.onclick = function(event) { if (event) event.stopPropagation(); openBottomSheet(group); };

            let lat = group.lat; let lng = group.lng; let coordKey = `${lat.toFixed(5)}_${lng.toFixed(5)}`; let offsetMultiplier = 1;
            while (usedCoords.has(coordKey)) {
                lat += 0.00015 * offsetMultiplier; lng -= 0.00015 * offsetMultiplier;
                coordKey = `${lat.toFixed(5)}_${lng.toFixed(5)}`; offsetMultiplier++;
            }
            usedCoords.add(coordKey);

            newOverlays.push(new kakao.maps.CustomOverlay({ position: new kakao.maps.LatLng(lat, lng), content: content, yAnchor: 1, clickable: true }));
        });
        
        clusterer.addMarkers(newOverlays);
        
        if (!isBackgroundUpdate) {
            if (renderList.length === 1) {
                map.setLevel(5); setTimeout(() => { map.panTo(new kakao.maps.LatLng(renderList[0].lat, renderList[0].lng)); }, 100);
            } else if (renderList.length > 1) {
                let bounds = new kakao.maps.LatLngBounds(); newOverlays.forEach(overlay => { bounds.extend(overlay.getPosition()); });
                setTimeout(() => { map.setBounds(bounds); }, 100);
            } 
        }
    }

            try {
                const safeElevatorNo = String(elv.elevatorNo).trim().padStart(7, '0');
                const res = await fetch(`/api/realtime-status?elevatorNo=${safeElevatorNo}`);
                const data = await res.json();
                const displayStateText = data.status;

                const isOperating = !(displayStateText.includes('정지') || displayStateText.includes('중지') || displayStateText.includes('불합격') || displayStateText.includes('고장') || displayStateText.includes('휴지') || displayStateText.includes('폐기') || displayStateText.includes('검사연기') || displayStateText.includes('폐지') || displayStateText.includes('확인불가'));
                
                elv.scanned = true;
                if (elv.isOperating !== isOperating || elv.state !== displayStateText) {
                    elv.isOperating = isOperating; elv.state = displayStateText; markerNeedsUpdate = true;
                }

                const statusEl = document.getElementById(`status-${elv.elevatorNo}`);
                if (statusEl) {
                    const finalColor = isOperating ? "#1e4e79" : "#d32f2f";
                    let finalText = displayStateText;
                    if (isOperating && (finalText === "합격" || finalText === "상태불명" || finalText.includes("정상") || finalText === "상태알수없음")) {
                        finalText = "정상운행";
                    }
                    statusEl.style.color = finalColor; statusEl.innerText = `[${finalText}]`;
                }
            } catch(e) {
                const statusEl = document.getElementById(`status-${elv.elevatorNo}`);
                if (statusEl) { statusEl.style.color = "#d32f2f"; statusEl.innerText = "[통신오류]"; }
            }
        });

        Promise.all(fetchPromises).then(() => { if (markerNeedsUpdate) renderData(true); });
    }

    function closeBottomSheet() { document.getElementById('bottomSheet').classList.remove('active'); }

    async function startBackgroundSync() {
        if (backgroundSyncController) backgroundSyncController.abort();
        backgroundSyncController = new AbortController(); const signal = backgroundSyncController.signal;

        while (!signal.aborted) {
            let targetGroup = null; let targetElv = null; const bounds = map.getBounds();

            for (let group of globalGroups) {
                if (group.lat && group.lng && bounds.contain(new kakao.maps.LatLng(group.lat, group.lng))) {
                    if (group.isDummy && !group.noElevator) { targetGroup = group; break; }
                    targetElv = group.elevators.find(e => !e.scanned); if (targetElv) { targetGroup = group; break; }
                }
            }
            if (!targetGroup) {
                for (let group of globalGroups) {
                    if (group.isDummy && !group.noElevator) { targetGroup = group; break; }
                    targetElv = group.elevators.find(e => !e.scanned); if (targetElv) { targetGroup = group; break; }
                }
            }
            if (!targetGroup) { await new Promise(r => setTimeout(r, 2000)); continue; }

            if (targetGroup.isDummy) {
                await hydrateDummyGroup(targetGroup, signal);
                renderData(true); await new Promise(r => setTimeout(r, 100)); continue;
            }

            try {
                const safeElevatorNo = String(targetElv.elevatorNo).trim().padStart(7, '0');
                const res = await fetch(`/api/realtime-status?elevatorNo=${safeElevatorNo}`, { signal });
                const data = await res.json(); const stts = data.status;
                targetElv.scanned = true; 
                
                const isOperating = !(stts.includes('정지') || stts.includes('중지') || stts.includes('불합격') || stts.includes('고장') || stts.includes('휴지') || stts.includes('폐기') || stts.includes('검사연기') || stts.includes('폐지') || stts.includes('확인불가'));
                if (targetElv.isOperating !== isOperating || targetElv.state !== stts) {
                    targetElv.isOperating = isOperating; targetElv.state = stts; renderData(true); 
                }
            } catch(e) {
                if (e.name === 'AbortError') return; targetElv.scanned = true; 
            }
            await new Promise(r => setTimeout(r, 100)); 
        }
    }

    window.onload = function() { kakao.maps.load(function() { initMap(); }); };
</script>
