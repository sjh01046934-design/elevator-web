<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 승강기 위치 지도앱</title>
    <!-- 카카오 맵 로딩 스크립트 -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=59f58919246c9ac3780496fc7e2c0d74&autoload=false"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #search-box { position: absolute; top: 15px; left: 15px; z-index: 10; background: white; padding: 12px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.2); display: flex; gap: 6px; }
        #keyword { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 220px; font-size: 14px; }
        #search-btn { padding: 10px 18px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        #search-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="keyword" placeholder="건물명을 입력하세요 (예: 스타벅스)" value="스타벅스">
        <button id="search-btn" onclick="searchElevators()">검색</button>
    </div>

    <div id="map"></div>

    <script>
        let map;
        let markers = []; 

        window.onload = function() {
            if (typeof kakao !== 'undefined') {
                kakao.maps.load(function() {
                    const mapContainer = document.getElementById('map');
                    const mapOption = { 
                        center: new kakao.maps.LatLng(36.48008, 127.28921), // 세종시청 중심
                        level: 4 
                    }; 
                    map = new kakao.maps.Map(mapContainer, mapOption);
                });
            } else {
                alert("카카오 라이브러리가 로드되지 않았습니다.");
            }
        };

        async function searchElevators() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword) return alert("건물명을 입력해주세요!");

            try {
                // 클라우드 서버 통신용 상대 경로
                const response = await fetch(`/api/elevators?keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();

                if (data.length === 0) {
                    alert("검색 결과가 없습니다.");
                    return;
                }

                // 기존 마커 지우기
                if (markers.length > 0) {
                    markers.forEach(marker => marker.setMap(null));
                    markers = [];
                }

                // 데이터 기반 마커 생성
                data.forEach(item => {
                    if (item.위도 && item.경도) {
                        const markerPosition = new kakao.maps.LatLng(Number(item.위도), Number(item.경도));
                        const marker = new kakao.maps.Marker({ position: markerPosition });
                        marker.setMap(map);
                        markers.push(marker);

                        // 제원 정보가 포함된 말풍선 UI 생성
                        const infowindow = new kakao.maps.InfoWindow({
                            content: `
                                <div style="padding:12px; font-size:13px; width:260px; color:#333; line-height:1.6; font-family:sans-serif;">
                                    <div style="font-size:15px; font-weight:bold; color:#2563eb; margin-bottom:5px; border-bottom:1px solid #eee; padding-bottom:5px;">
                                        ${item.건물명 || '건물명 없음'}
                                    </div>
                                    <b>승강기번호:</b> ${item.승강기고유번호 || '정보없음'} <br>
                                    <b>종류:</b> ${item.승강기종류 || '정보없음'} <br>
                                    <b>상태:</b> <span style="color:${item.운행상태 === '운행중' ? 'green' : 'red'};">${item.운행상태 || '정보없음'}</span> <br>
                                    <b>적재하중:</b> ${item.적재하중 || '정보없음'} <br>
                                    <b>설치일:</b> ${item.설치일자 || '정보없음'}
                                </div>
                            `
                        });
                        
                        // 마커 클릭 시 말풍선 열기
                        kakao.maps.event.addListener(marker, 'click', () => {
                            infowindow.open(map, marker);
                        });
                    }
                });

                // 첫 번째 검색 결과로 지도 이동
                if (data[0].위도 && data[0].경도) {
                    const moveLatLon = new kakao.maps.LatLng(Number(data[0].위도), Number(data[0].경도));
                    map.panTo(moveLatLon);
                }

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                alert("API 서버 통신 에러가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
