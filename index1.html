    function fastSearch(event, sido, query, type) {
        if (event && (event.type === 'touchend' || event.type === 'touchstart') && isTouchMoved) return;
        if (event) { event.preventDefault(); event.stopPropagation(); }
        document.getElementById('sidoSelector').value = sido; document.getElementById('searchInput').value = query;
        if (type) document.getElementById('searchType').value = type;
        document.getElementById('searchDropdown').style.display = 'none'; document.getElementById('searchInput').blur(); 
        if(type === 'place') searchKakaoPlaces(); else executeBroadSearch(); 
    }

    function fastDelete(event, index) {
        if (event && (event.type === 'touchend' || event.type === 'touchstart') && isTouchMoved) return;
        if (event) { event.preventDefault(); event.stopPropagation(); }
        let recents = JSON.parse(localStorage.getItem('elevator_recent_searches') || '[]'); 
        recents.splice(index, 1); localStorage.setItem('elevator_recent_searches', JSON.stringify(recents)); renderRecentSearches();
    }

    function fastExecute(event) {
        if (event && (event.type === 'touchend' || event.type === 'touchstart') && isTouchMoved) return;
        if (event) event.preventDefault();
        document.getElementById('searchDropdown').style.display = 'none'; document.getElementById('searchInput').blur();
        if (document.getElementById('searchType').value === 'place') searchKakaoPlaces(); else executeBroadSearch();
    }

    function fastClearSearch(event) {
        if (event && (event.type === 'touchend' || event.type === 'touchstart') && isTouchMoved) return;
        if (event) event.preventDefault();
        document.getElementById('searchInput').value = ''; document.getElementById('searchInput').focus();
    }

    function handleInputFocus() { if (!document.getElementById('searchInput').value.trim()) renderRecentSearches(); }
    function handleKeyPress(e) { if (e.key === 'Enter') fastExecute(e); }

    function renderRecentSearches() {
        const dropdown = document.getElementById('searchDropdown');
        let recents = JSON.parse(localStorage.getItem('elevator_recent_searches') || '[]');
        dropdown.innerHTML = '';
        if (recents.length === 0) { dropdown.style.display = 'none'; return; }
        dropdown.innerHTML = `<div class="dropdown-header">최근 검색어 <span class="clear-all-btn" onclick="clearAllRecent()">전체삭제</span></div>`;
        recents.forEach((item, index) => {
            const div = document.createElement('div'); div.className = 'dropdown-item';
            let typeLabel = item.type === 'place' ? '상호명' : (item.type === 'building' ? '건물명' : '도로명');
            div.innerHTML = `
                <div class="item-text" onmousedown="fastSearch(event, '${item.sido}', '${item.query}', '${item.type}')" ontouchstart="fastSearch(event, '${item.sido}', '${item.query}', '${item.type}')">
                    <div><span class="item-tag">${item.sido} | ${typeLabel}</span></div>
                    <div style="font-weight:bold;">${item.query}</div>
                </div>
                <div class="item-delete" onmousedown="fastDelete(event, ${index})" ontouchstart="fastDelete(event, ${index})">✕</div>
            `;
            dropdown.appendChild(div);
        });
        dropdown.style.display = 'block';
    }

    function saveRecentSearch(sido, query) {
        const searchType = document.getElementById('searchType').value;
        let recents = JSON.parse(localStorage.getItem('elevator_recent_searches') || '[]');
        recents = recents.filter(r => !(r.sido === sido && r.query === query && r.type === searchType)); 
        recents.unshift({sido, query, type: searchType}); if(recents.length > 7) recents.pop();

    function extractAddressParams(fullAddress) {
        if (!fullAddress) return { searchKeyword: "", address2: "", sigungu: "" };
        
        let clean = fullAddress.replace(/^(서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)[^\s]*\s+/, '');
        clean = clean.replace(/([가-힣A-Za-z]+[길로동읍면])(\d+)/g, '$1 $2'); 
        
        let words = clean.trim().split(/\s+/);
        let numIdx = -1;
        for (let i = words.length - 1; i >= 0; i--) { if (/^\d/.test(words[i])) { numIdx = i; break; } }
        
        let searchKeyword = numIdx !== -1 ? (words[numIdx - 1] || "") : (words[words.length - 1] || "");
        let address2 = numIdx !== -1 ? words[numIdx] : "";
        
        let sigungu = numIdx > 1 ? words[numIdx - 2] : ""; 
        
        return { 
            searchKeyword: searchKeyword.trim(), 
            address2: address2.trim(),
            sigungu: sigungu.trim()
        };
    }

    function filterValidElevators(items, borough, roadKeyword, roadNo, dongKeyword, jibunNo, selectedSido) {
        if (!items || items.length === 0) return [];
        
        const rClean = roadKeyword ? roadKeyword.trim() : "";
        const rNum = roadNo ? roadNo.trim() : ""; 

        return items.filter(item => {
            let originalAddr = String(item.building_address || item.address1 || item.address || "");
            
            if (selectedSido && selectedSido !== "전국") {
                let shortSido = selectedSido.substring(0, 2); 
                let addrFirstWord = originalAddr.trim().split(/\s+/)[0]; 
                let matched = addrFirstWord.includes(shortSido) || (item.sido && String(item.sido).includes(shortSido));
                
                if (!matched) return false; 
            }
            
            if (rClean && rNum) {
                const safeRoad = rClean.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const safeNum = rNum.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const exactMatchRegex = new RegExp(`${safeRoad}\\s*${safeNum}(?:-[0-9]+)?(?:\\s|\\(|,|$)`);
                
                if (!exactMatchRegex.test(originalAddr)) {
                    return false; 
                }
            } else if (rClean) {
                if (!originalAddr.replace(/\s+/g, '').includes(rClean.replace(/\s+/g, ''))) return false;
            }

            return true;
        });
    }

    async function fetchElevatorDataByAddressOrBuilding(apiSido, roadAddr, jibunAddr, placeName, signal) {
        showLoadingMsg(`⏳ 승강기 정보 조회중...`);
        try {
            const rParams = extractAddressParams(roadAddr);
            let rSearchPattern = "";
            
            if (rParams.searchKeyword && rParams.address2) {
                let mainNum = rParams.address2.split('-')[0].replace(/[^0-9]/g, ''); 
                rSearchPattern = rParams.sigungu ? 
                    `%${rParams.sigungu}%${rParams.searchKeyword}%${mainNum}%` : 
                    `%${rParams.searchKeyword}%${mainNum}%`;
            } else if (rParams.searchKeyword) {
                rSearchPattern = `%${rParams.searchKeyword}%`;
            }

            if (rSearchPattern) {
                const { data, error } = await supabaseClient.from('elevators_raw').select('*').ilike('building_address', rSearchPattern).limit(200); 
                
                if (error) console.error("[Query Error] Supabase 에러:", error);
                
                if (data && data.length > 0) {
                    let validDbItems = filterValidElevators(data, null, rParams.searchKeyword, rParams.address2, null, null, apiSido);
                    if (validDbItems.length > 0) return validDbItems;
                }
            }
        } catch (e) { console.error("Supabase 예외:", e.message); }

        const rParamsFallback = extractAddressParams(roadAddr);
        let combinedItems = [];
        if (rParamsFallback.searchKeyword) {
            let url = API_CONFIG.BASE_URL + `?serviceKey=${API_CONFIG.SERVICE_KEY}&numOfRows=500`;
            if (apiSido && apiSido !== "전국") url += `&sido=${encodeURIComponent(apiSido)}`;
            url += `&address1=${encodeURIComponent(rParamsFallback.searchKeyword + (rParamsFallback.address2 ? " " + rParamsFallback.address2 : ""))}&_type=json`;
            
            try {
                let res = await fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(url), { signal });
                if(res.ok) {
                    let data = await res.json();
                    let items = data.response?.body?.items?.item || [];
                    combinedItems = Array.isArray(items) ? items : [items];
                }
            } catch(e) {}
        }
        return filterValidElevators(combinedItems, null, rParamsFallback.searchKeyword, rParamsFallback.address2, null, null, apiSido);
    }

    async function requestPublicElevatorList(apiSido, queryText, signal, searchType) {
        let baseUrl = API_CONFIG.BASE_URL + `?serviceKey=${API_CONFIG.SERVICE_KEY}&numOfRows=500`;
        if (apiSido && apiSido !== "전국") baseUrl += `&sido=${encodeURIComponent(apiSido)}`;
        
        if (searchType === 'building') {
            baseUrl += `&buld_nm=${encodeURIComponent(queryText)}`;
        } else {
            const params = extractAddressParams(queryText);
            baseUrl += `&address1=${encodeURIComponent(params.searchKeyword)}`;
        }
        baseUrl += `&_type=json`;

        let list = [];
        try {
            let res = await fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(baseUrl + `&pageNo=1`), { signal });
            if (res.ok) {
                let data = await res.json();
                let totalCount = data.response?.body?.totalCount || 0;
                let items = data.response?.body?.items?.item || [];
                if (!Array.isArray(items)) items = [items];
                list.push(...items);

                let maxPages = Math.min(Math.ceil(totalCount / 500), 10); 
                if (maxPages > 1) {
                    for (let p = 2; p <= maxPages; p++) {
                        await new Promise(resolve => setTimeout(resolve, 250)); 
                        try {
                            let pageRes = await fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(baseUrl + `&pageNo=${p}`), { signal });
                            if (pageRes.status === 429) {
                                await new Promise(r => setTimeout(r, 1000));
                                pageRes = await fetch(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(baseUrl + `&pageNo=${p}`), { signal });
                                if (pageRes.status === 429) break;
                            }
                            if (pageRes.ok) {
                                let pageData = await pageRes.json();
                                let itms = pageData.response?.body?.items?.item || [];
                                if (!Array.isArray(itms)) itms = [itms];
                                list.push(...itms);
                            }
                        } catch (err) { if (err.name !== 'AbortError') console.warn(err); }
                    }
                }
                list.push(...items);
            }
        } catch (e) { if (e.name !== 'AbortError') console.error("공공데이터 호출 실패", e); }
        return list;
    }

    async function executeMegaScan(event, sido, keyword) {

    function buildGlobalGroups() {
        const groupedMap = new Map();

        allElevatorsData.forEach(apiItem => {
            const buldNm = apiItem.customBuldNm || apiItem.buldNm || apiItem.buld_nm || "건물명 없음";
            const addr1 = String(apiItem.building_address || apiItem.address1 || apiItem.address || ""); 
            const addr2 = String(apiItem.address2 || "");
            const address = (addr1 + " " + addr2).trim() || "주소 없음"; 
            const key = `${buldNm}_${address}`;

            if (!groupedMap.has(key)) {
                groupedMap.set(key, {
                    buildingName: buldNm, address: address,
                    roadAddress: addr1 + " " + addr2, jibunAddress: addr1 + " " + addr2,
                    lat: parseFloat(apiItem.gpsLati || apiItem.gps_lati) || null,
                    lng: parseFloat(apiItem.gpsLong || apiItem.gps_long) || null,
                    isDummy: false, noElevator: false, elevators: []
                });
            }

            const stts = String(apiItem.elvtrSttsNm || apiItem.elvtr_stts_nm || apiItem.elvtrStts || "상태불명").trim();
            const isOperating = !(stts.includes('정지') || stts.includes('중지') || stts.includes('불합격') || stts.includes('고장') || stts.includes('폐기') || stts.includes('휴지') || stts.includes('검사연기') || stts.includes('폐지') || stts.includes('확인불가'));
            
            const rawType = String(apiItem.elvtr_kind_nm || apiItem.elvtrKindNm || apiItem.elvtrDivNm || ""); let refinedType = "승객용"; 
            if (rawType.includes("장애") && rawType.includes("휠체어") && rawType.includes("화물") && rawType.includes("승객")) refinedType = "장애/승객화물용";
            else if (rawType.includes("에스컬레이터")) refinedType = "에스컬레이터";
            else if (rawType.includes("무빙워크")) refinedType = "무빙워크";
            else if (rawType.includes("수직") && rawType.includes("휠체어")) refinedType = "수직형리프트";
            else if (rawType.includes("경사") && rawType.includes("휠체어")) refinedType = "경사형리프트";
            else if (rawType.includes("장애인")) refinedType = "장애인용";
            else if (rawType.includes("소방") || rawType.includes("구조") || rawType.includes("비상")) refinedType = "소방구조용";
            else if (rawType.includes("화물") && rawType.includes("승객")) refinedType = "승객화물용";
            else if (rawType.includes("병원") || rawType.includes("침대")) refinedType = "병원용";

            let weightNum = String(apiItem.liveLoad || apiItem.live_load || "").replace(/[^0-9]/g, ""); 
            let finalWeight = weightNum ? weightNum + " kg" : "-";
            let speedNum = String(apiItem.ratedSpeed || apiItem.rated_speed || "").replace(/[^0-9.]/g, "");
            let finalSpeed = speedNum ? speedNum + " m/s" : "-";
            let capNum = String(apiItem.prsonCnt || apiItem.personCnt || apiItem.person_cnt || "").replace(/[^0-9]/g, "");
            let finalCapacity = "-";
            if (capNum && parseInt(capNum) > 0) finalCapacity = parseInt(capNum) + "명";
            else if (weightNum && parseInt(weightNum) > 0) finalCapacity = Math.floor(parseInt(weightNum) / 75) + "명";
            if (refinedType === "에스컬레이터" || refinedType === "무빙워크") finalCapacity = "-";

            const safeElevatorNo = String(apiItem.elevatorNo || apiItem.elevator_no || "").trim().padStart(7, '0') || "미상";

            let cleanInstallPlace = String(apiItem.installationPlace || apiItem.installation_place || "-").trim();
            cleanInstallPlace = cleanInstallPlace.replace(/0?(\d+)\s*월\s*0?(\d+)\s*일?/g, '$1-$2');

            groupedMap.get(key).elevators.push({
                elevatorNo: safeElevatorNo, type: refinedType, speed: finalSpeed, 
                shuttleSection: apiItem.shuttleSection || apiItem.shuttle_section || "확인중⏳",
                weight: finalWeight, capacity: finalCapacity, 
                installPlace: cleanInstallPlace,
                state: stts, isOperating: isOperating, scanned: false 
            });
        });

        globalGroups = Array.from(groupedMap.values());
        
        Promise.all(globalGroups.map((group, index) => {
            return new Promise(async (resolve) => {
                if (group.lat && group.lng) { resolve(); return; }
                if (geocodeCache.has(group.address)) {
                    const coords = geocodeCache.get(group.address); group.lat = coords.lat; group.lng = coords.lng; resolve(); return;
                }
                
                await new Promise(res => setTimeout(res, index * 100)); 
                let cleanAddress = group.address.replace(/외\s*\d+필지/g, '').trim();
                geocoder.addressSearch(cleanAddress, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        group.lat = parseFloat(result[0].y);
                        group.lng = parseFloat(result[0].x);
                    } else {
                        group.lat = 36.3504 + (Math.random() - 0.5) * 0.05;
                        group.lng = 127.3845 + (Math.random() - 0.5) * 0.05;
                    }
                    geocodeCache.set(group.address, {lat: group.lat, lng: group.lng});
                    resolve();
                });
            });
        })).then(() => { renderData(); });
    }

    function renderData(preventMove = false) {
        let renderList = [...globalGroups];
        const queryLower = lastQuery.replace(/\s+/g, '').toLowerCase();
        renderList.sort((a, b) => {
            const getScore = (g) => {
                const name = g.buildingName.replace(/\s+/g, '').toLowerCase(); const addr = g.address.replace(/\s+/g, '').toLowerCase();
                if (name === queryLower || addr === queryLower) return 1000 - name.length;
                if (name.startsWith(queryLower) || addr.startsWith(queryLower)) return 500 - name.length;
                if (name.includes(queryLower) || addr.includes(queryLower)) return 100 - name.length;
                return 0;
            };
            return getScore(b) - getScore(a);
        });
        
        clusterer.clear(); let newOverlays = []; let usedCoords = new Set(); 

        renderList.forEach(group => {
            if(group.lat === 0 || group.lng === 0 || group.lat === null) return; 
            
            const content = document.createElement('div');
            
            const isAllStopped = group.elevators.length > 0 && group.elevators.every(elv => !elv.isOperating);

            if (group.noElevator) {
                content.className = 'custom-marker no-elv';
                content.innerHTML = `<span>${group.buildingName} (승강기없음)</span>`;
            } else if (group.isDummy) {
                content.className = 'custom-marker dummy';
                content.innerHTML = `<span>${group.buildingName}</span><span style="background:#eee; color:#777; padding:1px 4px; border-radius:4px; margin-left:4px; font-size:10.5px;">스캔대기</span>`;
            } else {
                content.className = isAllStopped ? 'custom-marker stopped' : 'custom-marker';
                content.innerHTML = `<span>${group.buildingName} (${group.elevators.length}대)</span>`;
            }

            content.onclick = function(event) { if (event) event.stopPropagation(); openBottomSheet(group); };

            content.onmouseenter = function() {
                if (this.parentElement && this.parentElement.parentElement) {
                    this.parentElement.parentElement.style.zIndex = "100";
                }
            };
            content.onmouseleave = function() {
                if (this.parentElement && this.parentElement.parentElement) {
                    this.parentElement.parentElement.style.zIndex = group.isDummy ? "19" : "20";
                }
            };

            let lat = group.lat; let lng = group.lng; let coordKey = `${lat.toFixed(5)}_${lng.toFixed(5)}`; let offsetMultiplier = 1;
            while (usedCoords.has(coordKey)) { lat += 0.00015 * offsetMultiplier; lng -= 0.00015 * offsetMultiplier; coordKey = `${lat.toFixed(5)}_${lng.toFixed(5)}`; offsetMultiplier++; }
            usedCoords.add(coordKey);

            newOverlays.push(new kakao.maps.CustomOverlay({ position: new kakao.maps.LatLng(lat, lng), content: content, yAnchor: 1, clickable: true }));
        });
        
        clusterer.addMarkers(newOverlays);
        
        if (!preventMove) {
            if (renderList.length === 1) {
                map.setLevel(5); setTimeout(() => { map.panTo(new kakao.maps.LatLng(renderList[0].lat, renderList[0].lng)); }, 100);
            } else if (renderList.length > 1) {
                let bounds = new kakao.maps.LatLngBounds(); newOverlays.forEach(overlay => { bounds.extend(overlay.getPosition()); });
                setTimeout(() => { map.setBounds(bounds); }, 100);
            } 
        }
        
        // 지도를 완전히 다 그리고 나서 로딩화면 끄기
        hideLoadingMsg();
    } 

    async function hydrateDummyGroup(group, signal) {
        const sido = document.getElementById('sidoSelector').value; 
        const apiSido = FULL_SIDO_MAP[sido] || sido;
        
        let validItems = await fetchElevatorDataByAddressOrBuilding(apiSido, group.roadAddress || group.address, group.jibunAddress || group.address, group.buildingName, signal);

        if (validItems && validItems.length > 0) {
            let firstItem = validItems[0];
            let origBuldNm = String(firstItem.buldNm || firstItem.buld_nm || "").trim();
            if (origBuldNm && origBuldNm !== "null" && !origBuldNm.includes("없음") && !group.buildingName.includes(origBuldNm)) {
                group.buildingName = `${group.buildingName} [${origBuldNm}]`;
            }
        }

        const uniqueMap = new Map();
        validItems.forEach(item => { const elvNo = item.elevator_no || item.elevatorNo; if (elvNo && !uniqueMap.has(elvNo)) uniqueMap.set(elvNo, item); });

        let elevs = Array.from(uniqueMap.values()).filter(apiItem => {
            const type = String(apiItem.elvtr_kind_nm || apiItem.elvtrKindNm || apiItem.elvtrDivNm || "");
            return !(type.includes('덤웨이터') || type === '화물용' || (type.includes('화물용') && !type.includes('승객')));
        });

        group.elevators = elevs.map(apiItem => {
            const stts = String(apiItem.elvtr_stts_nm || apiItem.elvtrSttsNm || apiItem.elvtrStts || "상태불명").trim();
            const isOperating = !(stts.includes('정지') || stts.includes('중지') || stts.includes('불합격') || stts.includes('고장') || stts.includes('폐기') || stts.includes('휴지') || stts.includes('연기') || stts.includes('폐지') || stts.includes('확인불가'));
            
            const rawType = String(apiItem.elvtr_kind_nm || apiItem.elvtrKindNm || apiItem.elvtrDivNm || ""); 
            let refinedType = "승객용"; 
            if (rawType.includes("장애") && rawType.includes("휠체어") && rawType.includes("화물") && rawType.includes("승객")) refinedType = "장애/승객화물용";
            else if (rawType.includes("에스컬레이터")) refinedType = "에스컬레이터";
            else if (rawType.includes("무빙워크")) refinedType = "무빙워크";
            else if (rawType.includes("수직") && rawType.includes("휠체어")) refinedType = "수직형리프트";
            else if (rawType.includes("경사") && rawType.includes("휠체어")) refinedType = "경사형리프트";
            else if (rawType.includes("장애인")) refinedType = "장애인용";
            else if (rawType.includes("소방") || rawType.includes("구조") || rawType.includes("비상")) refinedType = "소방구조용";
            else if (rawType.includes("화물") && rawType.includes("승객")) refinedType = "승객화물용";
            else if (rawType.includes("병원") || rawType.includes("침대")) refinedType = "병원용";

            let weightNum = String(apiItem.live_load || apiItem.liveLoad || "").replace(/[^0-9]/g, ""); 
            let finalWeight = weightNum ? weightNum + " kg" : "-";
            let speedNum = String(apiItem.rated_speed || apiItem.ratedSpeed || "").replace(/[^0-9.]/g, "");
            let finalSpeed = speedNum ? speedNum + " m/s" : "-";
            let capNum = String(apiItem.person_cnt || apiItem.prsonCnt || apiItem.personCnt || "").replace(/[^0-9]/g, "");
            let finalCapacity = "-";
            if (capNum && parseInt(capNum) > 0) finalCapacity = parseInt(capNum) + "명";
            else if (weightNum && parseInt(weightNum) > 0) finalCapacity = Math.floor(parseInt(weightNum) / 75) + "명";
            if (refinedType === "에스컬레이터" || refinedType === "무빙워크") finalCapacity = "-";

            const safeElevatorNo = String(apiItem.elevator_no || apiItem.elevatorNo || "").trim().padStart(7, '0') || "미상";
            
            let cleanInstallPlace = String(apiItem.installation_place || apiItem.installationPlace || "-").trim();
            cleanInstallPlace = cleanInstallPlace.replace(/0?(\d+)\s*월\s*0?(\d+)\s*일?/g, '$1-$2');

            return {
                elevatorNo: safeElevatorNo, type: refinedType, speed: finalSpeed, 
                shuttleSection: apiItem.shuttle_section || apiItem.shuttleSection || "확인중⏳",
                weight: finalWeight, capacity: finalCapacity, 
                installPlace: cleanInstallPlace,
                state: stts, isOperating: isOperating, scanned: false 
            };
        });
        
        group.isDummy = false; 
        if (group.elevators.length === 0) group.noElevator = true;
    }

    async function openBottomSheet(groupData) {
        document.getElementById('resBuildingName').innerText = groupData.buildingName;
        document.getElementById('resAddress').innerText = groupData.address;
        
        document.getElementById('btnRoadview').href = `https://map.kakao.com/link/roadview/${groupData.lat},${groupData.lng}`;
        document.getElementById('btnDirections').href = `https://map.kakao.com/link/to/${encodeURIComponent(groupData.buildingName)},${groupData.lat},${groupData.lng}`;
        
        document.getElementById('bottomSheet').classList.add('active');
        const listContainer = document.getElementById('elevatorListContainer');

        if (groupData.isDummy) {
            listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color:#1e4e79; font-weight:bold;">⏳ 승강기 정보 분석 중...<br><span style="font-size:12px; color:#666;">(잠시만 기다려주세요)</span></div>';
            
            await hydrateDummyGroup(groupData, new AbortController().signal);
            renderData(true); 
            
            if (groupData.noElevator || groupData.elevators.length === 0) {
                document.getElementById('resTotalCount').innerText = `(0대)`;
                listContainer.innerHTML = '<div style="text-align:center; padding: 30px 10px; color:#d32f2f; font-weight:bold;">❌ 승객용 승강기가 없습니다.</div>';
                return;
            }
        }
        
        document.getElementById('resTotalCount').innerText = `(${groupData.elevators.length}대)`;

        listContainer.innerHTML = groupData.elevators.map((elv, i) => `
            <div class="elv-item-title">
                <span>#${i+1} 호기 (${elv.elevatorNo})</span> 
                <span id="status-${elv.elevatorNo}" class="status-badge" style="background:#94a3b8;">조회중...⏳</span>
            </div>
            <table class="data-table">
                <tr><th>승강기종류</th><td style="font-weight:bold;">${elv.type || '-'}</td><th>운행구간</th><td id="shuttle-${elv.elevatorNo}">확인중...</td></tr>
                <tr><th>정격속도</th><td>${elv.speed || '-'}</td><th>적재하중</th><td>${elv.weight || '-'}</td></tr>
                <tr><th>최대정원</th><td style="font-weight:bold; color:#1e4e79; background:#f8fafc;">${elv.capacity || '-'}</td><th>설치위치</th><td style="font-size:11.5px;">${elv.installPlace || '-'}</td></tr>
            </table>
        `).join('');

        for (const elv of groupData.elevators) {
            await new Promise(r => setTimeout(r, 400));
            try {
                const eNo = String(elv.elevatorNo).trim().padStart(7,'0');
                const url = `https://wild-river-017e.sjh01046934.workers.dev/?url=${encodeURIComponent(API_CONFIG.BASE_URL.replace('ListM','ViewM') + '?serviceKey='+API_CONFIG.SERVICE_KEY+'&elevator_no='+eNo+'&_type=json')}`;
                
                const res = await fetch(url);
                const data = await res.json();
                const item = data.response?.body?.item; 
                
                if(item) {
                    const status = item.elvtrStts || "상태불명";
                    const isOp = !(status.includes('정지') || status.includes('고장') || status.includes('불합격') || status.includes('휴지') || status.includes('연기') || status.includes('폐지'));
                    
                    document.getElementById(`shuttle-${eNo}`).innerText = item.shuttleSection || "구간없음";
                    
                    const badge = document.getElementById(`status-${eNo}`);
                    if(badge) {
                        badge.innerText = status;
                        badge.style.background = isOp ? "#1e4e79" : "#d32f2f";
                    }
                }
            } catch(e) { console.error(e); }
        }
    }
    
    function closeBottomSheet() { document.getElementById('bottomSheet').classList.remove('active'); }

    window.onload = function() { 
        kakao.maps.load(function() { 
            initMap(); 
            
            const inputEl = document.getElementById('searchInput');
            if (inputEl) {
                inputEl.addEventListener('input', function() {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(handleAutocomplete, 300);
                });
            }
        }); 
    };
</script>
